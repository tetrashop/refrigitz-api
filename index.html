<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refrigitz Graphic – 3D Studio</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #container { display: flex; height: 100vh; }
        #sidebar { width: 320px; background: #1e293b; color: #e2e8f0; display: flex; flex-direction: column; overflow-y: auto; transition: width 0.3s; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; }
        #viewer { flex: 1; position: relative; }
        .panel { padding: 1rem; border-bottom: 1px solid #334155; }
        .panel h3 { margin: 0 0 0.5rem 0; font-size: 1.1rem; color: #38bdf8; }
        button, .btn { background: #2563eb; color: white; border: none; border-radius: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.5; pointer-events: none; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; background: #475569; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; margin-bottom: 0.5rem; }
        #paintCanvas { border: 1px solid #475569; border-radius: 0.5rem; background: white; width: 100%; cursor: crosshair; }
        .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; align-items: center; }
        #status { position: absolute; bottom: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 0.3rem 0.6rem; border-radius: 0.3rem; font-size: 0.8rem; }
        #toggleSidebar { position: absolute; top: 10px; right: 10px; z-index: 10; background: #1e293b; color: white; border: none; border-radius: 0.5rem; padding: 0.5rem; cursor: pointer; font-size: 1.2rem; }
        input[type=range] { width: 100%; }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <div class="panel">
                <h3>📷 تبدیل ۲بعدی به ۳بعدی</h3>
                <label for="imageUpload" class="file-label">انتخاب تصویر</label>
                <input type="file" id="imageUpload" accept="image/*">
                <p id="fileName" style="margin:0.3rem 0;"></p>
                <div class="toolbar">
                    <label><input type="checkbox" id="invertCheck"> معکوس عمق</label>
                </div>
                <div class="toolbar">
                    <label>تعادل لبه/روشنایی (α):</label>
                    <input type="range" id="alphaSlider" min="0" max="1" step="0.05" value="0.85">
                    <span id="alphaValue">0.85</span>
                </div>
                <button id="btnConvertOBJ">🧊 مدل OBJ</button>
                <button id="btnConvertPNG" style="margin-top:0.3rem;">✨ تصویر سه‌بعدی</button>
                <a id="downloadOBJ" style="display:none;" download="model.obj">⬇️ دانلود OBJ</a>
                <img id="preview3D" style="width:100%; margin-top:0.5rem; display:none; border-radius:0.5rem;">
            </div>
            <div class="panel">
                <h3>🎨 نقاشی</h3>
                <canvas id="paintCanvas" width="280" height="200"></canvas>
                <div class="toolbar">
                    <button id="brushTool">🖌️ قلم</button>
                    <button id="eraserTool">🧹 پاک‌کن</button>
                    <input type="color" id="colorPicker" value="#000000">
                    <button id="clearCanvas">پاک کردن</button>
                </div>
                <button id="applyTexture" style="margin-top:0.5rem;">اعمال به صفحه سه‌بعدی</button>
                <button id="paintTo3D">تبدیل نقاشی به ۳بعدی</button>
            </div>
            <div class="panel">
                <h3>🧊 اشیاء پایه</h3>
                <button id="addBox">مکعب</button>
                <button id="addSphere">کره</button>
                <button id="addPlane">صفحه</button>
                <button id="deleteSelected">حذف انتخاب</button>
            </div>
        </div>
        <div id="viewer">
            <button id="toggleSidebar">☰</button>
            <div id="status"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // ----- Sidebar Toggle -----
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebar');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
            setTimeout(() => {
                renderer.setSize(viewer.clientWidth, viewer.clientHeight);
                camera.aspect = viewer.clientWidth / viewer.clientHeight;
                camera.updateProjectionMatrix();
            }, 300);
        });

        // ----- 3D Scene Setup -----
        const viewer = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e293b);
        const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(viewer.clientWidth, viewer.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        viewer.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 5);
        scene.add(dirLight);
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        let transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });
        scene.add(transformControls);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedObject = null;

        function selectObject(obj) {
            if (selectedObject === obj) return;
            if (selectedObject) transformControls.detach();
            selectedObject = obj;
            if (obj) {
                transformControls.attach(obj);
                document.getElementById('status').textContent = `انتخاب: ${obj.userData.name || 'شیء'}`;
            } else {
                document.getElementById('status').textContent = '';
            }
        }

        function onMouseDown(event) {
            if (transformControls.dragging) return;
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj && !obj.userData.selectable) obj = obj.parent;
                if (obj && obj.userData.selectable) { selectObject(obj); return; }
            }
            selectObject(null);
        }
        renderer.domElement.addEventListener('click', onMouseDown);

        function addObject(geometry, material, name) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData.selectable = true;
            mesh.userData.name = name;
            scene.add(mesh);
            selectObject(mesh);
        }

        document.getElementById('addBox').onclick = () => addObject(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0x3b82f6}), 'مکعب');
        document.getElementById('addSphere').onclick = () => addObject(new THREE.SphereGeometry(0.7,32,32), new THREE.MeshStandardMaterial({color: 0x10b981}), 'کره');
        document.getElementById('addPlane').onclick = () => addObject(new THREE.PlaneGeometry(2,2), new THREE.MeshStandardMaterial({color: 0xf59e0b, side: THREE.DoubleSide}), 'صفحه');
        document.getElementById('deleteSelected').onclick = () => { if (selectedObject) { scene.remove(selectedObject); selectObject(null); } };

        function loadOBJ(url) {
            const loader = new OBJLoader();
            loader.load(url, (object) => {
                object.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0xffffff, vertexColors: true });
                        child.userData.selectable = false;
                    }
                });
                object.userData.selectable = true;
                object.userData.name = 'مدل سه‌بعدی';
                scene.add(object);
                selectObject(object);
            }, undefined, (error) => { alert('خطا در بارگذاری مدل: ' + error.message); });
        }

        // ----- Conversion -----
        const BASE = window.location.origin;
        let lastBase64 = null;
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileName').textContent = '📎 ' + file.name;
            const reader = new FileReader();
            reader.onload = function(ev) { lastBase64 = ev.target.result.split(',')[1]; };
            reader.readAsDataURL(file);
        });

        const alphaSlider = document.getElementById('alphaSlider');
        const alphaValue = document.getElementById('alphaValue');
        alphaSlider.addEventListener('input', () => { alphaValue.textContent = alphaSlider.value; });

        async function convertTo3D(format) {
            if (!lastBase64) { alert('لطفاً یک تصویر انتخاب کنید.'); return; }
            const invert = document.getElementById('invertCheck').checked;
            const alpha = alphaSlider.value;
            const url = `${BASE}/api/2d-to-3d?format=${format}&invert=${invert}&alpha=${alpha}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({image: lastBase64})
                });
                if (!res.ok) {
                    const errData = await res.json().catch(() => null);
                    throw new Error(errData?.error || 'خطای سرور');
                }
                if (format === 'png') {
                    const blob = await res.blob();
                    const imgURL = URL.createObjectURL(blob);
                    document.getElementById('preview3D').src = imgURL;
                    document.getElementById('preview3D').style.display = 'block';
                } else if (format === 'obj') {
                    const blob = await res.blob();
                    const objURL = URL.createObjectURL(blob);
                    document.getElementById('downloadOBJ').href = objURL;
                    document.getElementById('downloadOBJ').style.display = 'block';
                    loadOBJ(objURL);
                }
            } catch (err) { alert('خطا: ' + err.message); }
        }

        document.getElementById('btnConvertOBJ').onclick = () => convertTo3D('obj');
        document.getElementById('btnConvertPNG').onclick = () => convertTo3D('png');

        // ----- Paint Module -----
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false, brushColor = '#000000', eraserMode = false;
        function startPosition(e) { painting = true; draw(e); }
        function endPosition() { painting = false; ctx.beginPath(); }
        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            ctx.lineWidth = eraserMode ? 10 : 3; ctx.lineCap = 'round';
            ctx.strokeStyle = eraserMode ? '#FFFFFF' : brushColor;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseleave', endPosition);
        document.getElementById('brushTool').onclick = () => eraserMode = false;
        document.getElementById('eraserTool').onclick = () => eraserMode = true;
        document.getElementById('colorPicker').oninput = (e) => brushColor = e.target.value;
        document.getElementById('clearCanvas').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('applyTexture').onclick = () => {
            const dataURL = canvas.toDataURL('image/png');
            const texture = new THREE.TextureLoader().load(dataURL);
            const material = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            plane.userData.selectable = true; plane.userData.name = 'نقاشی';
            scene.add(plane); selectObject(plane);
        };
        document.getElementById('paintTo3D').onclick = () => {
            const dataURL = canvas.toDataURL('image/png');
            lastBase64 = dataURL.split(',')[1];
            convertTo3D('obj');
        };

        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            setTimeout(() => {
                renderer.setSize(viewer.clientWidth, viewer.clientHeight);
                camera.aspect = viewer.clientWidth / viewer.clientHeight;
                camera.updateProjectionMatrix();
            }, sidebar.classList.contains('collapsed') ? 300 : 0);
        });
    </script>
</body>
</html>
