name: Generate Keystore (One-Time)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Generate Keystore
      run: |
        keytool -genkey -v \
          -keystore refrigitz-release.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias refrigitz \
          -storepass "Refrigitz2024!" \
          -keypass "Refrigitz2024!" \
          -dname "CN=Refrigitz, OU=Dev, O=Refrigitz, L=Tehran, ST=Tehran, C=IR"
    - name: Upload Keystore as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: refrigitz-keystore
        path: refrigitz-release.jks
