name: Generate Keystore (One-Time)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Keystore
      run: |
        keytool -genkey -v \
          -keystore refrigitz-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias refrigitz \
          -storepass "changeit" \
          -keypass "changeit" \
          -dname "CN=Refrigitz, OU=Dev, O=Refrigitz, L=City, ST=State, C=US"

    - name: Upload Keystore as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: refrigitz-keystore
        path: refrigitz-keystore.jks
