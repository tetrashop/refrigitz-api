name: Build Signed APK on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Keystore
      working-directory: android
      run: |
        keytool -genkey -v \
          -keystore refrigitz-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias refrigitz \
          -storepass "changeit" \
          -keypass "changeit" \
          -dname "CN=Refrigitz, OU=Dev, O=Refrigitz, L=City, ST=State, C=US"

    - name: Generate Gradle Wrapper
      working-directory: android
      run: gradle wrapper --gradle-version 8.7

    - name: Build Signed APK
      working-directory: android
      env:
        KEYSTORE_PASSWORD: changeit
        KEY_ALIAS: refrigitz
        KEY_PASSWORD: changeit
      run: ./gradlew assembleRelease

    - name: Upload Signed APK to Release
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: refrigitz-signed-apk
        path: android/app/build/outputs/apk/release/app-release.apk
